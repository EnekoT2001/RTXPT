# .github/workflows/build-windows-with-agility.yml
name: Build RTXPT (Windows + Agility SDK)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout (with submodules & LFS)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 0

      - name: Pull LFS files (Streamline)
        run: git lfs pull --include="External/Streamline/**" || true
        shell: bash

      - name: Inspect Streamline lib (quick check)
        run: powershell -Command "Get-Item 'External\\Streamline\\lib\\x64\\sl.interposer.lib' | Select-Object FullName, Length"

      - name: Configure (CMake) - enable Agility SDK
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DRTXPT_DOWNLOAD_AND_ENABLE_AGILITY_SDK=TRUE -DRTXPT_D3D_AGILITY_SDK_VERSION="1.719.0-preview" -DRTXPT_D3D_AGILITY_SDK_URL="https://www.nuget.org/api/v2/package/Microsoft.Direct3D.D3D12/1.719.0-preview"

      - name: Build (Release)
        run: cmake --build build --config Release -- /m

      - name: Upload built binaries
        uses: actions/upload-artifact@v4
        with:
          name: rtxpt-bin
          path: |
            bin/**
            build/**/Rtxpt.exe
